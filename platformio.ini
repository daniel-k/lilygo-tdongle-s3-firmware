; PlatformIO Project Configuration File
;
; LilyGo T-Dongle S3 firmware: Bluetooth HCI + Mass Storage + GUD display
; over USB. Builds also for any plain ESP32-S3 board (e.g. ESP32-S3 Super
; Mini) as a Bluetooth-HCI-only image.

[platformio]
default_envs = t_dongle_s3

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags =
    -Isrc

; Full firmware for the LilyGo T-Dongle S3:
;   - Bluetooth HCI over USB
;   - Mass Storage backed by the onboard µSD slot
;   - Generic USB Display backed by the 0.96" ST7735 LCD
[env:t_dongle_s3]
build_flags =
    ${env.build_flags}
    -DBOARD_T_DONGLE_S3=1

; Bluetooth-HCI-only firmware for plain ESP32-S3 boards (Super Mini etc.).
; No LCD, no µSD slot — just the BLE controller exposed over USB. Smaller
; binary, simpler 2-interface descriptor.
[env:super_mini]
build_flags =
    ${env.build_flags}
    -DBOARD_SUPER_MINI=1
